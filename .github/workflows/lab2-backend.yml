name: Lab name: Lab 2 Backend CI
on:
  push:
    paths: [ 'lab2/backend/**' ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t lab2-back ./lab2/backend
      - run: docker run -d -p 8081:8080 --name test-back lab2-back
      - run: sleep 5 && curl --silent --fail http://localhost:8081 | grep "Hello, World from Go backend!"