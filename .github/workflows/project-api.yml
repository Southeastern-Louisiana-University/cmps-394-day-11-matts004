name: Assignment API CI
on:
  push:
    paths: [ 'assignment/api/**' ]
jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: hello
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t project-api ./assignment/api
      - run: |
          docker run -d -p 5000:5000 \
          --name api-test \
          -e DB_HOST=localhost \
          --network host \
          project-api
      - run: sleep 5 && docker ps | grep api-test
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: 'project-api'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'