name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        run: docker build -t backend-app ./backend

      - name: Run Container
        run: |
          docker run -d -p 8081:8080 \
          --name test-backend \
          -e DB_URL=postgres://postgres:password@localhost:5432/testdb?sslmode=disable \
          --network host \
          backend-app

      - name: Verify Health
        run: |
          sleep 5
          curl --silent --fail http://localhost:8081 | grep "Hello, World from Go backend!"
      
      - name: Stop Container
        if: always()
        run: docker stop test-backend && docker rm test-backend

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: 'backend-app'
          format: 'table'
          severity: 'CRITICAL,HIGH'