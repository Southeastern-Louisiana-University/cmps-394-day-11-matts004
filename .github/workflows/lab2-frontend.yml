name: Lab 2 Frontend CI
on:
  push:
    paths: [ 'lab2/frontend/**' ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t lab2-front ./lab2/frontend
      - run: docker run -d -p 8080:80 --name test-front lab2-front
      - run: sleep 5 && curl --silent --fail http://localhost:8080 | grep "Hello from the frontend!"