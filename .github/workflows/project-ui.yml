name: Assignment UI CI
on:
  push:
    paths: [ 'assignment/ui/**' ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t project-ui ./assignment/ui
      - run: docker run -d -P --name ui-test project-ui
      - run: sleep 5 && docker ps | grep ui-test
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: 'project-ui'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'